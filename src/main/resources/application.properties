# Application
spring.application.name=GymTracker

# Active profile: "dev" (default, local development) or "prod" (Docker/production).
# Overridable via the SPRING_PROFILES_ACTIVE environment variable.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# Server
server.port=${SERVER_PORT:8080}

# MongoDB
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/gymtracker}
spring.data.mongodb.database=${MONGODB_DATABASE:gymtracker}

# Logging
logging.level.root=${LOG_LEVEL:INFO}
logging.level.com.gymtracker=${LOG_LEVEL:DEBUG}
logging.level.org.springframework.data.mongodb=INFO
